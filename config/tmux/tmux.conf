# Options
set -g base-index 1
set -g pane-base-index 1
set -g renumber-windows on

set-option -g detach-on-destroy off
set-option -g exit-empty off

set -g mouse on

set -g prefix C-a

# Bindings
bind -N "Horizontal Split" \\ split-window -h -c "#{pane_current_path}"
bind -N "Vertical Split" - split-window -v -c "#{pane_current_path}"

bind -N "Open a new window" c new-window -c "#{pane_current_path}" "exec $SHELL"
bind -N "Open $EDITOR in a new window" e new-window -c "#{pane_current_path}" "exec $EDITOR"
bind -N "Open lazygit in a new window" g new-window -c "#{pane_current_path}" "exec lazygit"
bind -N "Open lazydocker in a new window" d new-window -c "#{pane_current_path}" "exec lazydocker"
bind -N "Open lazydocker in a new window (compose files)" D new-window -c "~/Dotfiles/docker/compose/" "exec lazydocker"
bind -N "Open bottom in a new window" b new-window -c "#{pane_current_path}" "exec btm"
bind -N "Open gdu in a new window" u new-window -c "#{pane_current_path}" "exec gdu"

bind -N "Kill Session" X kill-session

bind -N "Enter tmux copy mode" -n "C-;" copy-mode
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind -T copy-mode-vi y send-keys -X copy-selection-and-cancel

# Tmux Plugin Manager Installation
if-shell '[ -z "$XDG_DATA_HOME" ]' {
  XDG_DATA_HOME="$HOME/.local/share"
  display-message "WARNING: XDG_DATA_HOME is not set, falling back to $HOME/.local/share/"
}

set-environment -g -F TMUX_PLUGIN_MANAGER_PATH "${XDG_DATA_HOME}/tmux/plugins"

if-shell '[ ! -d "${TMUX_PLUGIN_MANAGER_PATH}/tpm" ]' {
  run-shell 'git clone https://github.com/tmux-plugins/tpm ${TMUX_PLUGIN_MANAGER_PATH}/tpm'
  run-shell '${TMUX_PLUGIN_MANAGER_PATH}/tpm/bin/install_plugins'
}

# My custom status bar inspired by catppuccin
if-shell '[ -z "$XDG_CONFIG_HOME" ]' {
  XDG_CONFIG_HOME="$HOME/.config"
  display-message "WARNING: XDG_CONFIG_HOME is not set, falling back to $HOME/.config"
}

source "${XDG_CONFIG_HOME}/tmux/status.tmux"

# Plugins Configs
set -g @fzf-links-key p
set -g @fzf-links-use-colors off
set -g @fzf-links-editor-open-cmd "tmux new-window $EDITOR +%line '%file'"
set -g @fzf-links-browser-open-cmd "xdg-open '%url'"

set -g @sessionx-bind C-o
set -g @sessionx-prefix off
set -g @sessionx-window-height '80%'
set -g @sessionx-x-path '$HOME/Projects/'
set -g @sessionx-ls-command 'ls --color=always'
set -g @sessionx-preview-location 'right'
set -g @sessionx-preview-ratio '50%'

# Plugins Definitions
set -g @plugin 'omerxx/tmux-sessionx'
set -g @plugin 'alberti42/tmux-fzf-links'
set -g @plugin 'rafascalet/tmux-nav-master'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tpm'

# Plugins "Source"
run-shell "#{TMUX_PLUGIN_MANAGER_PATH}/tpm/tpm"
