[misc]
pre_sudo = true
no_retry = true
run_in_tmux = true
tmux_session_mode = "attach_always"
cleanup = true

[commands]
"Tmux" = "$TMUX_PLUGIN_MANAGER_PATH/bin/update_plugins all"
"ManDB" = "sudo -n mandb || sudo mandb"
"Neovim Mason" = "nvim --headless +MasonToolsUpdateSync +messages +qa"
"Neovim TreeSitter" = "nvim --headless +TSUpdateSync +messages +qa"
"PKGFILE" = "sudo -n pkgfile --update || sudo pkgfile --update"

[git]
repos = ["~/Projects/*/", "~/.packages/*/", "~/Dotfiles/"]
