git:
  diffContextSize: 100
  paging:
    colorArg: always
    pager: delta --dark --paging=never
    useConfig: false

gui:
  language: en
  nerdFontsVersion: "3"
  theme:
    activeBorderColor:
      - cyan
    selectedLineBgColor:
      - black

  branchColorPatterns:
    '^(main|master|dev|develop|development)$': magenta
    '^(docs|documentation)/': blue
    '^(feat|feature)/': yellow
    '^(refc|refac|refactor|refactoring)/': green
    '^(bug|bugfix|hotfix)/': red
    '^(test|testing)/': cyan
    '^(chore)/': black

  authorColors:
    '*': cyan
    'Rafael Scalet': magenta
    'Murilo Santos': blue
    'Angelo Ferraz Modanez': yellow
